name: souk_elkanto_mobile
description: "Souk ElKanto — The covered souk of Madinaty. Peer-to-peer second-hand marketplace for Madinaty residents."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  flutter_secure_storage: ^9.2.3
  shared_preferences: ^2.3.3
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  url_launcher: ^6.3.1
  google_fonts: ^6.2.1
  share_plus: ^10.1.2
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
